platforms:
- id: google_flights
  name: Google Flights
  categories:
  - flight
  icon: 🔵
  strategy: ddg
  ddg_template: google flights {origin} to {destination} {date} cheapest price
  result_fields:
  - price
  - airline
  - cabin_class
  - duration
  - stops
  - departure_time
  - arrival_time
  - url
  website: https://www.google.com/flights
  keywords:
  - google flights
  search_url_template: https://www.google.com/travel/flights?q=flights+from+{origin}+to+{destination}+on+{date}
- id: skyscanner
  name: Skyscanner
  categories:
  - flight
  icon: 🟠
  strategy: ddg
  ddg_template: skyscanner {origin} {destination} {date} flights price comparison
  result_fields:
  - price
  - airline
  - cabin_class
  - duration
  - stops
  - url
  website: https://www.skyscanner.com
  keywords:
  - skyscanner
  search_url_template: https://www.skyscanner.com/transport/flights/{origin}/{destination}/{date}/
- id: makemytrip_flights
  name: MakeMyTrip Flights
  categories:
  - flight
  icon: 🟡
  strategy: ddg
  ddg_template: makemytrip flights {origin} to {destination} {date} book ticket price
